name: Require Release Notes

on:
  pull_request:
    branches: [main]

jobs:
  release-notes:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Determine service type
        id: service_type
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          PROPS=$(gh api "repos/${{ github.repository }}/properties/values")

          # Handle both single-select (string) and multi-select (array) shapes.
          SERVICE_TYPE=$(echo "$PROPS" | jq -r '
            .[]
            | select(.property_name == "service-type")
            | .value
            | if type == "array" then .[0] else . end
            // empty
          ')

          # Belt-and-suspenders: strip any stray whitespace or quote chars
          SERVICE_TYPE=$(echo "$SERVICE_TYPE" | tr -d '"[:space:]\r')

          echo "Detected service-type: '${SERVICE_TYPE:-<none>}'"

          if [ -z "$SERVICE_TYPE" ]; then
            echo "::error::Repository is missing the 'service-type' custom property."
            exit 1
          fi

          echo "service_type=${SERVICE_TYPE}" >> "$GITHUB_OUTPUT"

      - name: Verify release notes
        env:
          NOTES_DIR: releases
          SERVICE_TYPE: ${{ steps.service_type.outputs.service_type }}
        run: |
          set -euo pipefail

          if [ ! -d "$NOTES_DIR" ]; then
            echo "::error::Expected top-level directory '$NOTES_DIR' does not exist."
            exit 1
          fi

          git fetch origin main
          CHANGED=$(git diff --name-only --diff-filter=AM origin/main...HEAD -- "$NOTES_DIR/" | grep -E '\.(md|markdown)$' || true)

          if [ -z "$CHANGED" ]; then
            echo "::error::No new or modified release notes under '$NOTES_DIR/' between this PR and main."
            echo "::error::Add a file like $NOTES_DIR/YYYY-MM-DD.md (or $NOTES_DIR/YYYY-MM-DD-NNN.md for multiple same-day releases) before merging."
            exit 1
          fi

          echo "Found release notes files:"
          echo "$CHANGED"

          # Build required metadata list based on service type
          REQUIRED_META=("Author" "Commit SHA")
          case "$SERVICE_TYPE" in
            backend)
              REQUIRED_META+=("Affected Services")
              ;;
            mobile)
              REQUIRED_META+=("Runtime Version")
              ;;
            frontend)
              ;;
            *)
              echo "::error::Unknown service-type '$SERVICE_TYPE'. Expected one of: backend, frontend, mobile."
              exit 1
              ;;
          esac

          FAIL=0
          while IFS= read -r file; do
            echo ""
            echo "── Validating $file (service-type: $SERVICE_TYPE) ──"

            # Top-level title: "# Release Notes — YYYY-MM-DD"
            # Filenames may have a sequence suffix (e.g. 2026-04-21-005.md) for multiple
            # same-day releases, but the heading stays as the plain date.
            if ! grep -qE '^# Release Notes [—-] [0-9]{4}-[0-9]{2}-[0-9]{2}[[:space:]]*$' "$file"; then
              echo "::error file=$file::First heading must match '# Release Notes — YYYY-MM-DD'."
              FAIL=1
            fi

            # Required H2 sections (same for all service types)
            REQUIRED_SECTIONS=("## Metadata" "## New Features" "## Bug Fixes" "## Maintenance" "## Rollback Strategy")
            for section in "${REQUIRED_SECTIONS[@]}"; do
              if ! grep -qxF "$section" "$file"; then
                echo "::error file=$file::Missing required section '$section'."
                FAIL=1
              fi
            done

            # Extract Metadata block (between "## Metadata" and the next "## ")
            META=$(awk '
              /^## Metadata[[:space:]]*$/ { inmeta=1; next }
              inmeta && /^## / { inmeta=0 }
              inmeta { print }
            ' "$file")

            # Validate required metadata fields
            for field in "${REQUIRED_META[@]}"; do
              if ! echo "$META" | grep -qE "^- ${field}:[[:space:]]+[^[:space:]].*"; then
                echo "::error file=$file::Metadata field '$field' is missing or empty."
                FAIL=1
              fi
            done

            # Mobile-specific: Runtime Version must be a semver (backticks optional)
            if [ "$SERVICE_TYPE" = "mobile" ]; then
              RUNTIME_LINE=$(echo "$META" | grep -E '^- Runtime Version:' || true)
              RUNTIME_VALUE=$(echo "$RUNTIME_LINE" | sed -E 's/^- Runtime Version:[[:space:]]*//' | tr -d '`[:space:]')
              if [ -n "$RUNTIME_VALUE" ] && ! echo "$RUNTIME_VALUE" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
                echo "::error file=$file::'Runtime Version' must be a semver like 0.1.3 (got '$RUNTIME_VALUE')."
                FAIL=1
              fi
            fi

            # Rollback Strategy must have content
            ROLLBACK=$(awk '
              /^## Rollback Strategy[[:space:]]*$/ { inrb=1; next }
              inrb && /^## / { inrb=0 }
              inrb { print }
            ' "$file" | tr -d '[:space:]')
            if [ -z "$ROLLBACK" ]; then
              echo "::error file=$file::'## Rollback Strategy' section is empty."
              FAIL=1
            fi
          done <<< "$CHANGED"

          if [ "$FAIL" -ne 0 ]; then
            exit 1
          fi
          echo ""
          echo "✓ Release notes valid."
